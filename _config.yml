# Site configuration
title: "Jareen Anjom"
subtitle: "AI & Machine Learning Researcher"
description: "Personal profile and portfolio of Jareen Anjom - Deep Learning, Edge Intelligence, Computer Vision"
url: "https://jareenanjom.github.io"
repository: "jareenanjom/jareenanjom.github.io"

# Author/Profile
author:
  name: "Jareen Anjom"
  email: "jareenanjom02@gmail.com"
  bio: "Researcher in Deep Learning for Healthcare, Edge Intelligence, and Computer Vision for Assistive Technologies"
  location: "Kuwait City, Kuwait"
  phone: "+965 69088765"
  avatar: "/images/Profile-Picture1.png"

# Social Links
social:
  google_scholar: "https://scholar.google.com/citations?user=1hBBLEkAAAAJ&hl=en"
  orcid: "https://orcid.org/0009-0003-9091-9992"
  github: "https://github.com/jareenanjom"
  linkedin: "https://www.linkedin.com/in/jareenanjom/"

# Build settings
markdown: kramdown
permalink: /:title/
future: false

# Jekyll
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Include/Exclude
include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .ruby-version
  - node_modules
  - Gemfile
  - Gemfile.lock

# Files to include in the build
keep_files:
  - files

# Timezone
timezone: Asia/Kuwait

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  teaching:
    output: false
    permalink: /:collection/:path/
